# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Swag Labs Selenide Tests with Selenium Grid
#
# Services:
#   selenium-hub   : Selenium Grid Hub
#   chrome-node    : Chrome browser node registered with the hub
#   test-runner    : Maven/JUnit test runner pointing at the grid
#
# Usage:
#   docker compose up --build --abort-on-container-exit
#
# To run only smoke tests:
#   SUITE=smoke docker compose up --build --abort-on-container-exit
#
# Allure results are written to ./target/allure-results on the host
# via the mounted volume.
# ─────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:

  # ── Selenium Grid Hub ───────────────────────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"   # event bus publisher
      - "4443:4443"   # event bus subscriber
      - "4444:4444"   # Grid UI / WebDriver endpoint
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Chrome Node ─────────────────────────────────────────────────────────────
  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - START_XVFB=false            # headless; no virtual display needed
    shm_size: "2gb"                 # prevents Chrome OOM in containers
    volumes:
      - /dev/shm:/dev/shm

  # ── Test Runner ─────────────────────────────────────────────────────────────
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - HEADLESS=true
      - BROWSER=chrome
      - SUITE=${SUITE:-}            # set SUITE=smoke or SUITE=regression to filter
      # Point Selenide at the remote Grid hub
      - SELENIDE_REMOTE=http://selenium-hub:4444/wd/hub
    volumes:
      # Expose Allure results to host so reports can be generated after the run
      - ./target:/app/target
    entrypoint: ["sh", "-c",
      "if [ -n \"$SUITE\" ]; then \
         mvn test -P$SUITE -Dheadless=$HEADLESS -Dbrowser=$BROWSER \
           -Dselenide.remote=$SELENIDE_REMOTE --no-transfer-progress; \
       else \
         mvn test -Dheadless=$HEADLESS -Dbrowser=$BROWSER \
           -Dselenide.remote=$SELENIDE_REMOTE --no-transfer-progress; \
       fi"]