# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Selenide UI Tests — Swag Labs
# ─────────────────────────────────────────────────────────────────────────────
name: Selenide UI Tests — Swag Labs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run (smoke | regression | all)"
        required: false
        default: "all"

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx1g"

# ── Job 1: Smoke Tests ────────────────────────────────────────────────────────
jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run smoke test suite
        run: mvn test -P smoke -Dheadless=true -Dbrowser=chrome --no-transfer-progress
        continue-on-error: true

      - name: Upload smoke Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: target/allure-results
          retention-days: 7

      - name: Upload smoke Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-smoke
          path: target/surefire-reports
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-smoke
          path: target/selenide-reports
          retention-days: 7

  # ── Job 2: Regression Tests ──────────────────────────────────────────────────
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run regression test suite
        run: mvn test -P regression -Dheadless=true -Dbrowser=chrome --no-transfer-progress
        continue-on-error: true

      - name: Upload regression Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-regression
          path: target/allure-results
          retention-days: 7

      - name: Upload regression Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-regression
          path: target/surefire-reports
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-regression
          path: target/selenide-reports
          retention-days: 7

  # ── Job 3: Allure Report ─────────────────────────────────────────────────────
  report:
    name: Generate and Publish Allure Report
    runs-on: ubuntu-latest
    needs: [smoke, regression]
    if: always()

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download smoke Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
        continue-on-error: true

      - name: Download regression Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results
        continue-on-error: true

      - name: Generate Allure HTML report
        run: mvn allure:report --no-transfer-progress

      - name: Upload Allure HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/allure-report
          retention-days: 14

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/allure-report
          destination_dir: allure-report

  # ── Job 4: Detailed Slack Notification ───────────────────────────────────────
  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [smoke, regression]
    if: always()

    steps:
      - name: Download smoke Surefire reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-smoke
          path: surefire/smoke
        continue-on-error: true

      - name: Download regression Surefire reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-regression
          path: surefire/regression
        continue-on-error: true

      - name: Download smoke Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results
        continue-on-error: true

      - name: Download regression Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-regression
          path: allure-results
        continue-on-error: true

      - name: Parse results and send detailed Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO:              ${{ github.repository }}
          BRANCH:            ${{ github.ref_name }}
          ACTOR:             ${{ github.actor }}
          RUN_ID:            ${{ github.run_id }}
          SERVER_URL:        ${{ github.server_url }}
          SMOKE_RESULT:      ${{ needs.smoke.result }}
          REGRESSION_RESULT: ${{ needs.regression.result }}
          COMMIT_SHA:        ${{ github.sha }}
          COMMIT_MSG:        ${{ github.event.head_commit.message }}
        run: |
          python3 << 'PYEOF'
          import os, json, glob, xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          def env(k, default=""):
              return os.environ.get(k, default)

          # ── 1. Parse Surefire XML for counts and failure details ───────────────
          totals   = {"tests": 0, "passed": 0, "failures": 0, "skipped": 0}
          suites   = {}
          failures = []

          for xf in glob.glob("surefire/**/*.xml", recursive=True):
              try:
                  root = ET.parse(xf).getroot()
              except Exception:
                  continue

              suite_name  = root.attrib.get("name", os.path.basename(xf)).split(".")[-1]
              s_tests     = int(root.attrib.get("tests",    0))
              s_fail      = int(root.attrib.get("failures", 0))
              s_err       = int(root.attrib.get("errors",   0))
              s_skip      = int(root.attrib.get("skipped",  0))
              s_passed    = s_tests - s_fail - s_err - s_skip

              totals["tests"]    += s_tests
              totals["failures"] += s_fail + s_err
              totals["skipped"]  += s_skip
              totals["passed"]   += s_passed

              suites[suite_name] = {
                  "tests":    s_tests,
                  "passed":   s_passed,
                  "failures": s_fail + s_err,
                  "skipped":  s_skip
              }

              for tc in root.findall("testcase"):
                  tc_name  = tc.attrib.get("name", "Unknown test")
                  tc_class = tc.attrib.get("classname", suite_name).split(".")[-1]
                  tc_time  = float(tc.attrib.get("time", 0))

                  for tag in ["failure", "error"]:
                      el = tc.find(tag)
                      if el is not None:
                          msg   = (el.attrib.get("message") or "").strip()
                          trace = (el.text or "").strip()
                          # Keep first 8 meaningful stack trace lines
                          trace_lines = [l for l in trace.splitlines()
                                         if l.strip() and not l.strip().startswith("at sun.")
                                         and not l.strip().startswith("at java.")][:8]
                          failures.append({
                              "suite":   tc_class,
                              "test":    tc_name,
                              "message": msg[:350] if msg else "No error message captured",
                              "trace":   "\n".join(trace_lines),
                              "time":    round(tc_time, 2)
                          })

          # ── 2. Enrich failures with Allure metadata (severity, feature, story) ─
          allure_meta = {}
          for jf in glob.glob("allure-results/*.json"):
              try:
                  with open(jf) as f:
                      data = json.load(f)
              except Exception:
                  continue
              full_name = data.get("fullName", "")
              if not full_name:
                  continue
              labels = {l["name"]: l["value"]
                        for l in data.get("labels", [])
                        if "name" in l and "value" in l}
              allure_meta[full_name] = {
                  "severity":    labels.get("severity", "normal").upper(),
                  "feature":     labels.get("feature",  "—"),
                  "story":       labels.get("story",    "—"),
                  "description": (data.get("description") or "").strip(),
              }

          for fail in failures:
              matched = False
              for full_name, meta in allure_meta.items():
                  if fail["test"] in full_name or \
                     fail["test"].replace(" ", "_") in full_name:
                      fail.update(meta)
                      matched = True
                      break
              if not matched:
                  fail.update({"severity": "NORMAL", "feature": "—",
                               "story": "—", "description": ""})

          # ── 3. Overall status ─────────────────────────────────────────────────
          smoke_ok      = env("SMOKE_RESULT")      == "success"
          regression_ok = env("REGRESSION_RESULT") == "success"
          all_ok        = smoke_ok and regression_ok
          color         = "#2eb886" if all_ok else "#e01e5a"
          status_text   = "ALL TESTS PASSED" if all_ok else "TESTS FAILED"
          status_icon   = "✅" if all_ok else "❌"

          # ── 4. URLs ───────────────────────────────────────────────────────────
          repo       = env("REPO")
          run_id     = env("RUN_ID")
          server_url = env("SERVER_URL", "https://github.com")
          gh_user    = repo.split("/")[0]
          gh_repo    = repo.split("/")[1] if "/" in repo else repo
          allure_url = f"https://{gh_user}.github.io/{gh_repo}/allure-report"
          run_url    = f"{server_url}/{repo}/actions/runs/{run_id}"

          # ── 5. Suite breakdown text ───────────────────────────────────────────
          suite_lines = []
          for name, s in sorted(suites.items()):
              icon = "✅" if s["failures"] == 0 else "❌"
              suite_lines.append(
                  f"{icon} *{name}*   "
                  f"Total: `{s['tests']}`  "
                  f"✅ `{s['passed']}`  "
                  f"❌ `{s['failures']}`  "
                  f"⏭ `{s['skipped']}`"
              )
          suite_text = "\n".join(suite_lines) if suite_lines else "_No suite data_"

          # ── 6. Build Slack Block Kit payload ──────────────────────────────────
          blocks = []

          # Header block
          blocks.append({
              "type": "header",
              "text": {
                  "type": "plain_text",
                  "text": f"{status_icon}  Swag Labs UI Tests — {status_text}",
                  "emoji": True
              }
          })

          # Run metadata
          commit_sha = env("COMMIT_SHA", "")[:7]
          commit_msg = env("COMMIT_MSG", "—")[:80]
          blocks.append({
              "type": "section",
              "fields": [
                  {"type": "mrkdwn", "text": f"*Repository:*\n<{server_url}/{repo}|{repo}>"},
                  {"type": "mrkdwn", "text": f"*Branch:*\n`{env('BRANCH')}`"},
                  {"type": "mrkdwn", "text": f"*Commit:*\n`{commit_sha}` {commit_msg}"},
                  {"type": "mrkdwn", "text": f"*Triggered by:*\n{env('ACTOR')}"},
                  {"type": "mrkdwn", "text": f"*Smoke Suite:*\n{'✅ Passed' if smoke_ok else '❌ Failed'}"},
                  {"type": "mrkdwn", "text": f"*Regression Suite:*\n{'✅ Passed' if regression_ok else '❌ Failed'}"},
              ]
          })

          blocks.append({"type": "divider"})

          # Overall test counts
          pass_rate = round((totals['passed'] / totals['tests'] * 100), 1) \
              if totals['tests'] > 0 else 0
          blocks.append({
              "type": "section",
              "text": {
                  "type": "mrkdwn",
                  "text": (
                      f"*📊 Overall Test Summary*\n\n"
                      f">  🔢  *Total tests run:*  `{totals['tests']}`\n"
                      f">  ✅  *Passed:*           `{totals['passed']}`\n"
                      f">  ❌  *Failed:*           `{totals['failures']}`\n"
                      f">  ⏭  *Skipped:*          `{totals['skipped']}`\n"
                      f">  📈  *Pass rate:*        `{pass_rate}%`"
                  )
              }
          })

          blocks.append({"type": "divider"})

          # Suite breakdown
          blocks.append({
              "type": "section",
              "text": {
                  "type": "mrkdwn",
                  "text": f"*🗂 Results by Test Suite*\n\n{suite_text}"
              }
          })

          # Failed tests (detailed)
          if failures:
              blocks.append({"type": "divider"})
              blocks.append({
                  "type": "section",
                  "text": {
                      "type": "mrkdwn",
                      "text": f"*🔴 Failed Test Details ({len(failures)} failure{'s' if len(failures) != 1 else ''})*"
                  }
              })

              severity_impact = {
                  "BLOCKER":  "🚨 *Release blocker* — this failure prevents deployment.",
                  "CRITICAL": "🔴 *Critical* — core functionality is broken.",
                  "NORMAL":   "🟡 *Moderate* — functionality degraded, workaround may exist.",
                  "MINOR":    "🟢 *Minor* — limited user impact.",
                  "TRIVIAL":  "⚪ *Trivial* — cosmetic issue only."
              }

              for i, fail in enumerate(failures[:8]):
                  severity = fail.get("severity", "NORMAL")
                  feature  = fail.get("feature",  "—")
                  story    = fail.get("story",     "—")
                  desc     = fail.get("description", "")
                  impact   = severity_impact.get(severity, "🟡 *Moderate* impact.")

                  trace_display = fail["trace"][:500] + "\n…" \
                      if len(fail["trace"]) > 500 else fail["trace"]

                  fail_block_text = (
                      f"*{i+1}. `{fail['suite']}` › `{fail['test']}`*\n"
                      f"\n"
                      f">  📋 *Feature:*   {feature}\n"
                      f">  📖 *Story:*     {story}\n"
                  )
                  if desc:
                      fail_block_text += f">  📝 *Description:*  {desc[:150]}\n"

                  fail_block_text += (
                      f">  ⚠️ *Severity:*   `{severity}`\n"
                      f">  💥 *Impact:*     {impact}\n"
                      f"\n"
                      f">  🔍 *What failed:*\n"
                      f">  ```{fail['message']}```\n"
                      f"\n"
                      f">  🪜 *Steps to Reproduce:*\n"
                      f">  1️⃣  Open `https://www.saucedemo.com`\n"
                      f">  2️⃣  Log in as `standard_user` / `secret_sauce`\n"
                      f">  3️⃣  Navigate to the *{feature}* section\n"
                      f">  4️⃣  Perform: _{fail['test'].replace('_', ' ')}_\n"
                      f">  5️⃣  Observe the error above\n"
                  )

                  if trace_display:
                      fail_block_text += (
                          f"\n"
                          f">  📄 *Stack Trace (trimmed):*\n"
                          f">  ```{trace_display}```"
                      )

                  blocks.append({
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": fail_block_text}
                  })

                  if i < min(len(failures), 8) - 1:
                      blocks.append({"type": "divider"})

              if len(failures) > 8:
                  blocks.append({
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"_...and *{len(failures) - 8} more* failed tests not shown here. "
                              f"See the full Allure report for all details._"
                          )
                      }
                  })

          # Links section
          blocks.append({"type": "divider"})
          blocks.append({
              "type": "section",
              "text": {
                  "type": "mrkdwn",
                  "text": (
                      f"*🔗 Quick Links*\n\n"
                      f">  📈  <{allure_url}|View Full Allure Report>\n"
                      f">  ⚙️   <{run_url}|View GitHub Actions Run>"
                  )
              }
          })

          # Footer
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          blocks.append({
              "type": "context",
              "elements": [
                  {"type": "mrkdwn",
                   "text": f"🕐 Run completed at {now}  |  Swag Labs UI Automation"}
              ]
          })

          # ── 7. POST to Slack ──────────────────────────────────────────────────
          import urllib.request, urllib.error

          payload = json.dumps({
              "attachments": [{"color": color, "blocks": blocks}]
          }).encode("utf-8")

          webhook_url = env("SLACK_WEBHOOK_URL")
          if not webhook_url:
              print("SLACK_WEBHOOK_URL not set — skipping Slack notification.")
          else:
              req = urllib.request.Request(
                  webhook_url,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"Slack notification sent: {resp.status}")
              except urllib.error.HTTPError as e:
                  print(f"Slack HTTP error {e.code}: {e.read().decode()}")
              except Exception as e:
                  print(f"Failed to send Slack notification: {e}")

          # ── 8. Print summary to Actions log ──────────────────────────────────
          print("\n" + "="*65)
          print("  SWAG LABS UI TEST RESULTS")
          print("="*65)
          print(f"  Total:    {totals['tests']}")
          print(f"  Passed:   {totals['passed']}")
          print(f"  Failed:   {totals['failures']}")
          print(f"  Skipped:  {totals['skipped']}")
          print(f"  Pass rate: {pass_rate}%")
          print("="*65)
          if failures:
              print(f"\n  FAILED TESTS:")
              for fail in failures:
                  sev = fail.get('severity', 'NORMAL')
                  print(f"  ✗ [{sev}] {fail['suite']} › {fail['test']}")
                  print(f"    → {fail['message'][:120]}")
          print(f"\n  Allure Report: {allure_url}")
          print(f"  Actions Run:   {run_url}\n")

          PYEOF